# LOCAL config — points at the REAL data/v2 tree, but with fast single-worker
# runtime and a couple of small regions handy for local iteration.
#
# ⚠ NOT a sandbox: data_root is the real data/v2, so `run` with stages 2-4 WILL
# read and write production outputs. Use it for quick visualize / airport-quality
# checks against real cached data. For fully isolated runs, generate a config
# with data_root under a scratch dir instead (see tests/conftest.py).
#
# Pass via: cli.py --config src/hotspots/pipeline_config_local.yaml ...

paths:
  data_root: data/v2
  conus_dir: data
  traffic_tiles_local: ../../../tiles/traffic
  traffic_tiles_url: https://airbornehotspots.org/tiles

deploy:
  remote: hotspots-initial:hotspots
  maps_dir: data/v2/maps

runtime:
  workers: 1
  alt_ceiling_ft: 18000
  remount_cmd: ""
  retry_attempts: 2
  retry_pause_s: 1

dates:
  default_start: "20250601"
  default_end:   "20250615"

regions:
  wvi:   {lat_min: 36, lat_max: 37, lon_min: -122, lon_max: -121}
  conus: {lat_min: 24, lat_max: 50, lon_min: -125, lon_max: -65}

profiles:
  visualize:
    stages: [5]
    pmtiles: false
  aggregate-viz:
    stages: [4, 5]
    pmtiles: false
  analyze:
    stages: [3, 4, 5]
    pmtiles: false
  full:
    stages: [2, 3, 4, 5]
    pmtiles: false
